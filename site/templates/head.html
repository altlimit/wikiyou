{{define "head"}}
{{$site := data "site.json"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{if .title}}{{.title}} — {{end}}{{$site.title}}</title>
<meta name="description" content="{{if .description}}{{.description}}{{else}}{{$site.description}}{{end}}">

<!-- Open Graph -->
<meta property="og:type" content="{{if .og_type}}{{.og_type}}{{else}}website{{end}}">
<meta property="og:title"
    content="{{if .title}}{{.title}} — {{$site.title}}{{else}}{{$site.title}} — {{$site.tagline}}{{end}}">
<meta property="og:description" content="{{if .description}}{{.description}}{{else}}{{$site.description}}{{end}}">
<meta property="og:url" content="{{$site.url}}{{.Path}}">
<meta property="og:site_name" content="{{$site.title}}">
{{if .image}}
<meta property="og:image" content="{{$site.url}}{{.image}}">{{end}}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{if .title}}{{.title}} — {{$site.title}}{{else}}{{$site.title}}{{end}}">
<meta name="twitter:description" content="{{if .description}}{{.description}}{{else}}{{$site.description}}{{end}}">
{{if .image}}
<meta name="twitter:image" content="{{$site.url}}{{.image}}">{{end}}

<!-- Canonical -->
<link rel="canonical" href="{{$site.url}}{{.Path}}">

<!-- Favicon -->
<link rel="icon" href="{{.BasePath}}favicon.ico">

<!-- Styles -->
<link rel="stylesheet" href="{{.BasePath}}css/styles.css">
{{template "addHead" .}}
{{end}}

{{define "addHead"}}{{end}}
