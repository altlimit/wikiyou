<!DOCTYPE html>
<html lang="en">

<head>
    {{template "head" .}}
</head>

<body>
    {{template "nav" .}}

    <main>
        <div class="game-layout">
            {{if .category}}
            <ul class="breadcrumbs">
                <li><a href="/">Home</a></li>
                <li><a href="/{{.category}}">{{.category_label}}</a></li>
                <li>{{.title}}</li>
            </ul>
            {{end}}

            <div class="game-hero">
                <div class="game-hero-icon">🎮</div>
                <h1>{{.title}}</h1>
                {{if .description}}
                <p class="game-hero-desc">{{.description}}</p>
                {{end}}
            </div>

            <div class="game-stage">
                {{template "content" .}}
            </div>

            <div class="game-details">
                {{template "game-info" .}}
            </div>
        </div>
    </main>

    {{template "footer" .}}
</body>

</html>

{{define "game-info"}}{{end}}
