{{define "nav"}}
{{$site := data "site.json"}}
{{$nav := data "nav.json"}}
<nav class="site-nav">
    <div class="nav-inner">
        <a href="/" class="nav-brand">
            <span class="brand-icon">W</span>
            <span>{{$site.title}}</span>
        </a>

        <div class="flex items-center gap-1">
            <ul class="nav-links" id="nav-links">
                {{range $nav}}
                {{if .children}}
                <li class="nav-dropdown">
                    <button class="nav-dropdown-toggle" aria-expanded="false">
                        {{.name}} <span class="nav-caret">▾</span>
                    </button>
                    <ul class="nav-dropdown-menu">
                        {{range .children}}
                        <li><a href="{{.path}}" {{if eq $.Path .path}}class="active" {{end}}>{{if .icon}}<span
                                    class="nav-dropdown-icon">{{.icon}}</span>{{end}}{{.name}}</a></li>
                        {{end}}
                    </ul>
                </li>
                {{else}}
                <li><a href="{{.path}}" {{if eq $.Path .path}}class="active" {{end}}>{{.name}}</a></li>
                {{end}}
                {{end}}
            </ul>

            <div class="search-container relative">
                <button class="search-toggle" id="search-toggle" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
                <input type="text" id="site-search" class="search-input" placeholder="Search..." autocomplete="off">
                <div id="search-results" class="search-dropdown hidden"></div>
            </div>

            <a href="{{$site.github}}" class="nav-github" target="_blank" rel="noopener">
                <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                </svg>
                <span>GitHub</span>
            </a>

            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
        </div>
    </div>
</nav>
<script>
    (function () {
        var t = document.getElementById('nav-toggle'), n = document.getElementById('nav-links');
        if (t && n) { t.addEventListener('click', function () { n.classList.toggle('open'); }) }

        // Dropdown toggles
        var dropdowns = document.querySelectorAll('.nav-dropdown');
        for (var i = 0; i < dropdowns.length; i++) {
            (function (dd) {
                var btn = dd.querySelector('.nav-dropdown-toggle');
                if (!btn) return;
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var isOpen = dd.classList.contains('open');
                    // close all dropdowns first
                    var all = document.querySelectorAll('.nav-dropdown.open');
                    for (var j = 0; j < all.length; j++) {
                        all[j].classList.remove('open');
                        all[j].querySelector('.nav-dropdown-toggle').setAttribute('aria-expanded', 'false');
                    }
                    if (!isOpen) {
                        dd.classList.add('open');
                        btn.setAttribute('aria-expanded', 'true');
                    }
                });
            })(dropdowns[i]);
        }
        document.addEventListener('click', function () {
            var all = document.querySelectorAll('.nav-dropdown.open');
            for (var j = 0; j < all.length; j++) {
                all[j].classList.remove('open');
                all[j].querySelector('.nav-dropdown-toggle').setAttribute('aria-expanded', 'false');
            }
        });

        // Search toggle for mobile
        var searchToggle = document.getElementById('search-toggle');
        var searchContainer = searchToggle ? searchToggle.closest('.search-container') : null;
        if (searchToggle && searchContainer) {
            searchToggle.addEventListener('click', function (e) {
                e.stopPropagation();
                searchContainer.classList.toggle('search-open');
                var input = searchContainer.querySelector('.search-input');
                if (searchContainer.classList.contains('search-open') && input) {
                    input.focus();
                }
            });
        }

        var searchInput = document.getElementById('site-search');
        var searchResults = document.getElementById('search-results');
        var searchData = [];
        var loaded = false;

        if (searchInput && searchResults) {
            searchInput.addEventListener('focus', function () {
                if (!loaded) {
                    fetch('/search.xml')
                        .then(function (response) { return response.text(); })
                        .then(function (str) { return (new window.DOMParser()).parseFromString(str, "text/xml"); })
                        .then(function (data) {
                            var pages = data.getElementsByTagName("page");
                            for (var i = 0; i < pages.length; i++) {
                                var title = (pages[i].getElementsByTagName("title")[0] || {}).textContent || '';
                                if (!title) continue;
                                searchData.push({
                                    title: title,
                                    description: (pages[i].getElementsByTagName("description")[0] || {}).textContent || '',
                                    url: (pages[i].getElementsByTagName("url")[0] || {}).textContent || '',
                                    category_label: (pages[i].getElementsByTagName("category_label")[0] || {}).textContent || ''
                                });
                            }
                            loaded = true;
                        });
                }
            });

            searchInput.addEventListener('input', function (e) {
                var q = e.target.value.toLowerCase();
                if (q.length < 2) {
                    searchResults.classList.add('hidden');
                    return;
                }

                var results = searchData.filter(function (item) {
                    return item.title.toLowerCase().indexOf(q) !== -1 || item.description.toLowerCase().indexOf(q) !== -1;
                }).slice(0, 8);

                if (results.length > 0) {
                    var html = '';
                    results.forEach(function (item) {
                        html += '<a href="' + item.url + '" class="search-result-item">';
                        if (item.category_label) {
                            html += '<span class="badge badge-accent" style="float:right;font-size:0.7em;">' + item.category_label + '</span>';
                        }
                        html += '<strong>' + item.title + '</strong>';
                        if (item.description) {
                            html += '<p class="text-xs text-muted truncate m-0">' + item.description + '</p>';
                        }
                        html += '</a>';
                    });
                    searchResults.innerHTML = html;
                    searchResults.classList.remove('hidden');
                } else {
                    searchResults.innerHTML = '<div class="p-3 text-muted text-sm pb-0">No results found.</div>';
                    searchResults.classList.remove('hidden');
                }
            });

            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    searchResults.classList.add('hidden');
                    searchInput.blur();
                    if (searchContainer) searchContainer.classList.remove('search-open');
                }
            });

            document.addEventListener('click', function (e) {
                var sc = document.querySelector('.search-container');
                if (sc && !sc.contains(e.target)) {
                    searchResults.classList.add('hidden');
                    sc.classList.remove('search-open');
                }
            });
        }
    })();
</script>
{{end}}
